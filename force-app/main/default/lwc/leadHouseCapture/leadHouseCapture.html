<!-- Lead House Capture LWC
Multi-screen form: Screen 1 = Contact Info, Screen 2 = Property Search
-->
<template>
    <lightning-card title="Lead Capture: Find Houses" icon-name="custom:custom63">
        <!-- Progress Indicator -->
        <div class="slds-p-around_small slds-text-align_center slds-border_bottom">
            <span class="slds-text-body_small slds-text-color_weak">
                Step {currentStepNumber} of 2
            </span>
        </div>

        <!-- Screen 1: Contact Information -->
        <template if:true={isContactScreen}>
            <div class="slds-p-around_medium">
                <div class="slds-text-heading_medium slds-m-bottom_medium">Contact Information</div>
                <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_medium">
                    Please provide your contact details. Either Email or Phone is required.
                </p>

                <!-- Error Banner -->
                <template if:true={contactValidationError}>
                    <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                        <span class="slds-assistive-text">error</span>
                        <span class="slds-icon_container slds-icon-utility-error slds-m-right_x-small">
                            <lightning-icon icon-name="utility:error" alternative-text="error" size="x-small" variant="inverse"></lightning-icon>
                        </span>
                        <h2>{contactValidationError}</h2>
                    </div>
                </template>

                <div class="slds-form" role="list">
                    <lightning-input
                        label="First Name"
                        value={firstName}
                        onchange={handleFirstNameChange}
                        required
                        class="slds-m-bottom_small"
                    ></lightning-input>

                    <lightning-input
                        label="Last Name"
                        value={lastName}
                        onchange={handleLastNameChange}
                        required
                        class="slds-m-bottom_small"
                    ></lightning-input>

                    <lightning-input
                        type="email"
                        label="Email"
                        value={email}
                        onchange={handleEmailChange}
                        class="slds-m-bottom_small"
                        field-level-help="Please provide at least one contact method (Email or Phone)"
                    ></lightning-input>

                    <lightning-input
                        type="tel"
                        label="Phone"
                        value={phone}
                        onchange={handlePhoneChange}
                        class="slds-m-bottom_medium"
                        field-level-help="Please provide at least one contact method (Email or Phone)"
                    ></lightning-input>

                    <div class="slds-m-top_medium">
                        <lightning-button
                            variant="brand"
                            label="Next"
                            title="Next"
                            onclick={handleNext}
                        ></lightning-button>
                    </div>
                </div>
            </div>
        </template>

        <!-- Screen 2: Property Preferences and Search -->
        <template if:true={isPropertyScreen}>
        <div class="slds-p-around_medium slds-grid slds-gutters">
            <!-- Property Search Filters -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                <div class="slds-text-heading_small slds-m-bottom_small">Property Preferences</div>

                <lightning-input
                    type="text"
                    label="Which city or state are you looking?"
                    value={cityOrState}
                    onchange={handleCityStateChange}
                ></lightning-input>

                <lightning-input
                    class="slds-m-top_small"
                    type="number"
                    min="0"
                    label="How many bedrooms are you looking for?"
                    value={minBedrooms}
                    onchange={handleBedroomsChange}
                ></lightning-input>

                <lightning-combobox
                    class="slds-m-top_small"
                    label="What style of house are you looking for?"
                    placeholder="Any"
                    value={selectedStyle}
                    options={styleOptions}
                    onchange={handleStyleChange}
                ></lightning-combobox>

                <div class="slds-grid slds-gutters slds-m-top_small">
                    <div class="slds-col">
                        <lightning-input
                            type="number"
                            label="Min Price"
                            value={minPrice}
                            formatter="currency"
                            step="1000"
                            onchange={handleMinPriceChange}
                        ></lightning-input>
                    </div>
                    <div class="slds-col">
                        <lightning-input
                            type="number"
                            label="Max Price"
                            value={maxPrice}
                            formatter="currency"
                            step="1000"
                            onchange={handleMaxPriceChange}
                        ></lightning-input>
                    </div>
                </div>

                <div class="slds-m-top_small">
                    <lightning-button
                        variant="brand"
                        label="Search"
                        title="Search"
                        onclick={handleSearch}
                    ></lightning-button>
                </div>

                <template if:true={selectedCount}>
                    <div class="slds-m-top_small slds-text-body_small">
                        Selected: {selectedCount} / 3
                    </div>
                </template>
            </div>

            <!-- Results -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-3">
                <div class="slds-text-heading_small slds-m-bottom_small">
                    Suggested Houses
                </div>

                <template if:true={isSearching}>
                    <div class="slds-p-vertical_large slds-align_absolute-center">
                        <lightning-spinner alternative-text="Searching" size="small"></lightning-spinner>
                    </div>
                </template>

                <template if:true={properties.length}>
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <template for:each={properties} for:item="prop">
                            <div key={prop.id} class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <article class="slds-card slds-p-around_small property-card">
                                    <div class="slds-grid slds-gutters_small slds-wrap">
                                        <div class="slds-col slds-size_1-of-4">
                                            <template if:true={prop.thumbnailUrl}>
                                                <img src={prop.thumbnailUrl} alt={prop.name} class="thumb" />
                                            </template>
                                            <template if:false={prop.thumbnailUrl}>
                                                <div class="thumb thumb-placeholder slds-align_absolute-center slds-text-color_weak">No Image</div>
                                            </template>
                                        </div>
                                        <div class="slds-col slds-size_3-of-4">
                                            <div class="slds-text-title_bold">{prop.name}</div>
                                            <div class="slds-text-body_small slds-m-top_xx-small">
                                                <template if:true={prop.price}>
                                                    <span>{prop.price}</span>
                                                </template>
                                                <template if:true={prop.beds}>
                                                    <span class="slds-m-left_small">{prop.beds} bd</span>
                                                </template>
                                                <template if:true={prop.style}>
                                                    <span class="slds-m-left_small">{prop.style}</span>
                                                </template>
                                            </div>
                                            <template if:true={prop.city}>
                                                <div class="slds-text-body_small slds-m-top_xx-small">
                                                    <template if:true={prop.state}>
                                                        <span>{prop.city}, {prop.state}</span>
                                                    </template>
                                                    <template if:false={prop.state}>
                                                        <span>{prop.city}</span>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:true={prop.displayTags}>
                                                <div class="slds-m-top_xx-small slds-text-color_weak slds-text-body_small">
                                                    <span class="slds-m-right_xx-small slds-text-color_weak">Tags:</span>
                                                    <span>{prop.displayTags}</span>
                                                </div>
                                            </template>
                                            <div class="slds-m-top_small">
                                                <template if:true={prop.selected}>
                                                    <lightning-button
                                                        data-id={prop.id}
                                                        label="Selected"
                                                        variant="success"
                                                        icon-name="utility:check"
                                                        onclick={toggleSelect}
                                                    ></lightning-button>
                                                </template>
                                                <template if:false={prop.selected}>
                                                    <lightning-button
                                                        data-id={prop.id}
                                                        label="Select"
                                                        variant="brand"
                                                        onclick={toggleSelect}
                                                        disabled={prop.selectDisabled}
                                                    ></lightning-button>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </article>
                            </div>
                        </template>
                    </div>
                </template>

                <template if:true={hasSearched}>
                    <template if:false={properties.length}>
                        <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-top_medium" role="alert">
                            <span class="slds-assistive-text">warning</span>
                            <span class="slds-icon_container slds-icon-utility-warning slds-m-right_x-small">
                                <lightning-icon icon-name="utility:warning" alternative-text="warning" size="x-small"></lightning-icon>
                            </span>
                            <h2>No houses match your search criteria. Please try adjusting your filters.</h2>
                        </div>
                    </template>
                </template>

                <div class="slds-m-top_medium">
                    <lightning-button
                        variant="neutral"
                        label="Back"
                        title="Back"
                        onclick={handleBack}
                        class="slds-m-right_x-small"
                    ></lightning-button>
                    <lightning-button
                        variant="brand"
                        label="Submit Leads"
                        title="Submit Leads"
                        onclick={handleSubmit}
                        disabled={isSubmitDisabled}
                    ></lightning-button>
                </div>
            </div>
        </div>
        </template>
    </lightning-card>
</template>
